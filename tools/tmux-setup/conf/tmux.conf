# ====================================
# Magus tmux configuration
# Full Claude Code integration with session persistence,
# kill-server protection, and clipboard image pasting.
# Source: https://github.com/MadAppGang/magus/tools/tmux-setup
# ====================================

# ====================================
# Magus Color Palette
# ====================================
# Override these to retheme all Magus scripts (host-status, update-check, etc.)
# Default: Catppuccin Mocha
set -g @magus_fg "#1e1e2e"           # Dark foreground (text on colored bg)
set -g @magus_warn_bg "#f9e2af"      # Yellow — update available
set -g @magus_host_local_bg "#cba6f7" # Purple/Mauve — local machine
set -g @magus_host_ssh_bg "#e64553"  # Red — SSH session

# ====================================
# General Settings
# ====================================

# Enable true color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -as terminal-features ',*:clipboard'

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Enable mouse support
set -g mouse on

# Show tmux session name in iTerm window title
set -g set-titles on
set -g set-titles-string "#{session_name}"
set -g allow-passthrough on
set -g focus-events on

# tmux-sensible covers: escape-time, history-limit, focus-events, status-interval, etc.

# ====================================
# Key Bindings
# ====================================

# Change prefix to Ctrl+a (easier to reach)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Reload config with prefix + r
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Split panes with | and - (more intuitive)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Pane navigation handled by vim-tmux-navigator (C-h/j/k/l)
# Pane resizing handled by tmux-pain-control (Prefix + shift+arrows)

# Quick window switching
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5

# Swap window to target index (override default move-window)
bind . command-prompt -T target "swap-window -t '%%'"

# Toggle status bar
bind b set-option status

# ====================================
# Copy Mode (vi style)
# ====================================

setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
# tmux-yank handles y/Enter clipboard integration (pbcopy on macOS, etc.)

# Quick copy/paste without prefix
bind -n M-c copy-mode
bind -n M-v paste-buffer

# ====================================
# Theme: Catppuccin Mocha
# ====================================

set -g status-position bottom

# Catppuccin options (must be set before TPM loads the plugin)
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_status_left_separator ""
set -g @catppuccin_status_right_separator " "
set -g @catppuccin_status_middle_separator " "
set -g @catppuccin_window_status_style "basic"
set -g @catppuccin_status_background "default"
set -g @catppuccin_window_flags "none"
set -g @catppuccin_status_connect_separator "yes"
set -g @catppuccin_window_current_number_color "#{@thm_yellow}"
set -g @catppuccin_status_session_text_bg "#{?client_prefix,#{E:@thm_red},#{E:@thm_green}}"
set -g @catppuccin_status_session_text_fg "#{E:@thm_crust}"
set -g @catppuccin_status_date_time_text_bg "#{E:@thm_sapphire}"
set -g @catppuccin_status_date_time_text_fg "#{E:@thm_crust}"

# ====================================
# Plugins
# ====================================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'Morantron/tmux-fingers'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'schasse/tmux-jump'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'MadAppGang/tmux-claude-continuity'

# ====================================
# Plugin Settings
# ====================================

# Resurrect: restore pane contents and processes
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

# Continuum: auto-save every 15 min, auto-restore on tmux start
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Fingers: quick-select patterns on screen (Prefix + F)
set -g @fingers-key F
set -g @fingers-skip-wizard 1

# Jump: easymotion-style jump (Prefix + j)
set -g @jump-key 'j'

# Yank: use system clipboard
set -g @yank-selection 'clipboard'
set -g set-clipboard on

# tmux-fzf: fuzzy finder for sessions/windows/panes (Prefix + f)
TMUX_FZF_LAUNCH_KEY="f"

# Claude Code session persistence
set -g @claude-continuity-statusline-passthrough "bash ~/.claude/statusline-command.sh"

# Initialize TPM (keep at very bottom)
run '~/.tmux/plugins/tpm/tpm'

# Re-bind tmux-jump after TPM (pain-control steals Prefix+j)
run '~/.tmux/plugins/tmux-jump/tmux-jump.tmux'

# ====================================
# Post-plugin overrides
# ====================================

# Bell-aware window format
set -g window-status-format "#[fg=#{E:@thm_crust},bg=#{?window_bell_flag,#{E:@thm_yellow},#{E:@catppuccin_window_number_color}}] #I #[fg=#{?window_bell_flag,#{E:@thm_crust},#{E:@thm_fg}},bg=#{?window_bell_flag,#{E:@thm_yellow},#{E:@catppuccin_window_text_color}}] #W "

# Status bar content
set -g status-left-length 80
set -g status-right-length 150
set -g status-left "#{E:@catppuccin_status_session}"
set -g status-right "#(~/.tmux/plugins/tmux-continuum/scripts/continuum_save.sh)#(~/.tmux/scripts/tmux-update-status.sh)#(~/.tmux/scripts/host-status.sh)#{E:@catppuccin_status_date_time}"

# Yellow selection in copy mode
set -g mode-style "bg=#f9e2af,fg=#1e1e2e"
